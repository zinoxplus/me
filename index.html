<!DOCTYPE html>
<html lang="fa">
<head>
<title> XLMC </title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif
}

body{
background:#000;
color:#eee;
overflow:hidden;
}

/* Background GIF */
.bg{
position:fixed;
inset:0;
background:url('https://raw.githubusercontent.com/zinoxplus/me/main/bg.gif') center/cover no-repeat;
filter:brightness(.55) contrast(1.25) grayscale(.15);
z-index:-2;
animation:bgZoom 20s infinite alternate ease-in-out;
}

.bg::after{
content:"";
position:absolute;
inset:0;
background:
radial-gradient(circle at 20% 30%, rgba(255,255,255,.05), transparent 30%),
radial-gradient(circle at 80% 70%, rgba(120,120,120,.08), transparent 35%),
radial-gradient(circle at 50% 50%, rgba(80,0,80,.08), transparent 40%);
animation:smokeMove 20s infinite alternate ease-in-out;
}

@keyframes bgZoom{
from{transform:scale(1)}
to{transform:scale(1.08)}
}

body::before{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,.68);
z-index:-1;
}

/* War Overlay */
body::after{
content:"";
position:fixed;
inset:0;
pointer-events:none;
background:
linear-gradient(rgba(0,0,0,.15),rgba(0,0,0,.35)),
url("https://www.transparenttextures.com/patterns/asfalt-dark.png");
mix-blend-mode:screen;
opacity:.35;
z-index:0;
animation:flicker 6s infinite;
}

/* Steam Button */
.steam{
position:fixed;
top:20px;
right:20px;
color:#fff;
border:1px solid rgba(255,255,255,.25);
padding:10px 18px;
text-decoration:none;
font-size:13px;
transition:.35s;
backdrop-filter:blur(8px);
background:rgba(0,0,0,.25);
box-shadow:0 0 15px rgba(255,255,255,.08);
z-index:10;
}

.steam:hover{
background:#fff;
color:#000;
box-shadow:
0 0 15px rgba(255,255,255,.35),
0 0 30px rgba(140,0,200,.25);
}

/* CARD */
.card{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:650px;
padding:45px;
border-radius:25px;
overflow:hidden;

background:
linear-gradient(rgba(0,0,0,.58),rgba(0,0,0,.78));

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.05);

animation:
fade 1s ease,
neonGlow 5s infinite alternate;

box-shadow:
0 0 20px rgba(255,255,255,.08),
0 0 40px rgba(90,0,120,.20),
0 0 70px rgba(0,0,0,.95);
}

.card::before{
content:"";
position:absolute;
inset:0;
border-radius:25px;
pointer-events:none;

background:
repeating-linear-gradient(
120deg,
rgba(255,255,255,.02) 0px,
rgba(255,255,255,.02) 1px,
transparent 1px,
transparent 5px
);

opacity:.25;
mix-blend-mode:overlay;
}

@keyframes neonGlow{
0%{
box-shadow:
0 0 15px rgba(150,150,150,.15),
0 0 30px rgba(100,0,120,.18),
0 0 50px rgba(255,255,255,.05);
}
100%{
box-shadow:
0 0 30px rgba(220,220,220,.20),
0 0 45px rgba(120,0,180,.28),
0 0 80px rgba(255,255,255,.10);
}
}

@keyframes fade{
from{
opacity:0;
transform:translate(-50%,-55%)
}
to{
opacity:1;
transform:translate(-50%,-50%)
}
}

/* Title */
h1{
text-align:center;
letter-spacing:8px;
margin-bottom:12px;
color:#ddd;

text-shadow:
0 0 8px rgba(255,255,255,.35),
0 0 20px rgba(120,0,120,.25),
0 0 40px rgba(255,255,255,.1);
}

/* War Text */
.war-text{
text-align:center;
font-size:11px;
letter-spacing:4px;
margin-bottom:28px;
color:rgba(255,255,255,.42);

text-shadow:
0 0 10px rgba(255,255,255,.15);

animation:fadeText 5s infinite alternate;
}

@keyframes fadeText{
from{opacity:.35}
to{opacity:.75}
}

/* INFO */
.info{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
margin-bottom:35px;
}

.field{
background:rgba(20,20,20,.45);
padding:14px;
border-radius:14px;
display:flex;
align-items:center;
gap:12px;
transition:.4s;
border:1px solid rgba(255,255,255,.04);

box-shadow:
inset 0 0 15px rgba(255,255,255,.015);
}

.field:hover{
background:rgba(40,40,40,.42);
transform:scale(1.05);

box-shadow:
0 0 10px rgba(255,255,255,.08),
0 0 20px rgba(120,0,120,.15);
}

.field i{
font-size:18px;
color:#ddd;
width:22px;
text-align:center;
}

/* PLAYER */
.player{
margin-top:20px;
}

.progress{
height:8px;
background:#080808;
border-radius:10px;
overflow:hidden;
cursor:pointer;
border:1px solid rgba(255,255,255,.04);
}

.bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#777,#ddd,#666);

box-shadow:
0 0 10px rgba(255,255,255,.25),
0 0 20px rgba(120,0,120,.25);
}

.controls{
margin-top:18px;
display:flex;
justify-content:center;
gap:30px;
font-size:20px;
}

.controls i{
cursor:pointer;
color:#999;
transition:.35s;
}

.controls i:hover{
color:#fff;
transform:scale(1.22);

text-shadow:
0 0 10px rgba(255,255,255,.4),
0 0 20px rgba(120,0,120,.3);
}

.time{
margin-top:12px;
text-align:center;
font-size:13px;
color:#bbb;
}

/* VOLUME */
.volume{
margin-top:14px;
text-align:center;
}

.volume input{
width:60%;
accent-color:#aaa;
}

/* PLAYLIST */
.playlist{
margin-top:18px;
background:rgba(15,15,15,.55);
border-radius:15px;
padding:10px;
border:1px solid rgba(255,255,255,.04);
}

.track{
padding:10px;
cursor:pointer;
border-radius:10px;
transition:.3s;
font-size:13px;
color:#ccc;
}

.track:hover{
background:rgba(255,255,255,.10);
}

.active{
background:rgba(255,255,255,.16);
box-shadow:
0 0 12px rgba(255,255,255,.08),
0 0 20px rgba(120,0,120,.18);
}

/* Flicker */
@keyframes flicker{
0%{opacity:.28}
5%{opacity:.35}
10%{opacity:.30}
15%{opacity:.38}
20%{opacity:.33}
50%{opacity:.36}
70%{opacity:.30}
100%{opacity:.34}
}

/* Smoke */
@keyframes smokeMove{
0%{
transform:translateY(0px) scale(1);
opacity:.6;
}
100%{
transform:translateY(-20px) scale(1.05);
opacity:.9;
}
}
</style>
</head>

<body>

<div class="bg"></div>

<a class="steam" target="_blank"
href="https://steamcommunity.com/id/M_LMC/">

</a>

<div class="card">

<h1>X LMC</h1>

<div class="war-text">
BROKEN SIGNALS • LOST SOUL • AFTER WAR
</div>

<div class="info">

<div class="field">
<i class="fa fa-user"></i>
Age: 20
</div>

<div class="field">
<i class="fa fa-clock"></i>
Timeplay CS: 800h
</div>

<div class="field">
<i class="fa fa-trophy"></i>
Rank: 12000
</div>

<div class="field">
<i class="fa fa-layer-group"></i>
Steam Level: 22
</div>

<div class="field">
<i class="fab fa-discord"></i>

</div>

<div class="field">

</div>

<div class="field">
<i class="fa fa-quote-left"></i>
I LOST IN THE BACKROOMS
</div>

</div>

<div class="player">

<audio id="audio" preload="auto"></audio>

<div class="progress" onclick="seek(event)">
<div class="bar" id="bar"></div>
</div>

<div class="controls">
<i class="fa fa-backward" onclick="prev()"></i>

<i class="fa fa-play" id="playBtn"
onclick="togglePlay()"></i>

<i class="fa fa-stop" onclick="stopTrack()"></i>

<i class="fa fa-forward" onclick="next()"></i>
</div>

<div class="time" id="time">
00:00 / 00:00
</div>

<div class="volume">
<input type="range"
min="0"
max="1"
step="0.01"
value="1"
oninput="audio.volume=this.value">
</div>

<div class="playlist" id="playlist"></div>

</div>
</div>

<script>
const tracks=[
{
title:"Nothing After",
src:"https://raw.githubusercontent.com/zinoxplus/me/main/nothing_after.mp3"
},

{
title:"TAHETASH ALEXER",
src:"https://raw.githubusercontent.com/zinoxplus/me/main/TAHETASH_ALEXER.mp3"
},

{
title:"VOID",
src:"https://raw.githubusercontent.com/zinoxplus/me/main/VOID.mp3"
}
];

const audio=document.getElementById("audio");
const bar=document.getElementById("bar");
const time=document.getElementById("time");
const playlist=document.getElementById("playlist");
const playBtn=document.getElementById("playBtn");

let current=0;

/* Build Playlist */
tracks.forEach((track,i)=>{

let div=document.createElement("div");

div.className="track";

div.innerText=track.title;

div.onclick=()=>loadTrack(i,true);

playlist.appendChild(div);

});

/* Load Track */
function loadTrack(i,auto=false){

current=i;

audio.src=tracks[i].src;

document
.querySelectorAll(".track")
.forEach(t=>t.classList.remove("active"));

playlist.children[i]
.classList.add("active");

if(auto){

audio.muted=true;

audio.play().then(()=>{

setTimeout(()=>{
audio.muted=false;
},500);

playBtn.className="fa fa-pause";

});

}

}

/* Play Pause */
function togglePlay(){

if(audio.paused){

audio.play();

playBtn.className="fa fa-pause";

}else{

audio.pause();

playBtn.className="fa fa-play";

}

}

/* Stop */
function stopTrack(){

audio.pause();

audio.currentTime=0;

playBtn.className="fa fa-play";

}

/* Next */
function next(){

current=(current+1)%tracks.length;

loadTrack(current,true);

}

/* Prev */
function prev(){

current=(current-1+tracks.length)%tracks.length;

loadTrack(current,true);

}

/* Progress */
audio.ontimeupdate=()=>{

if(audio.duration){

bar.style.width=
(audio.currentTime/audio.duration*100)+"%";

time.textContent=
format(audio.currentTime)
+" / "+
format(audio.duration);

}

}

/* Seek */
function seek(e){

const rect=
e.currentTarget.getBoundingClientRect();

const percent=
(e.clientX-rect.left)/rect.width;

audio.currentTime=
percent*audio.duration;

}

/* Time Format */
function format(sec){

let m=Math.floor(sec/60);

let s=Math.floor(sec%60);

return
(m<10?"0":"")+m+":"
+(s<10?"0":"")+s;

}

/* Auto Play */
window.onload=()=>{

loadTrack(0,true);

}
</script>

</body>
